name: .NET Framework CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: "Cyber Crime Protection - ST10480375 PROG6221 POE"

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: nuget restore

    - name: Build project
      run: msbuild /p:Configuration=Release
